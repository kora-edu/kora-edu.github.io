<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <!-- Favicon links -->
  <link rel="icon" href="{{ "/assets/img/favicon.ico" | prepend: site.baseurl }}" type="image/x-icon">
  <link rel="icon" href="{{ "/assets/img/favicon.png" | prepend: site.baseurl }}" type="image/png">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | prepend: site.baseurl }}">
  
  <!-- Inline button styling for simplicity -->
  <style>
    .apple-button {
      display: inline-block;
      background-color: #000;
      color: #fff;
      font-family: "San Francisco", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 16px;
      padding: 12px 24px;
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      margin-top: 20px;
      transition: background-color 0.3s ease;
    }
    .apple-button:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <!-- Content of the page -->
  <div class="container">
    <h1>KORA</h1>
    <p>Generative Academic AI for Students and Educators</p>
    <a href="https://your-external-site-link.com" class="apple-button">Try KORA</a>
  </div>
</body>
